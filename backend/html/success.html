<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>StockAI - 登录成功</title>
    <style>
        body { font-family: Arial; padding: 40px; text-align: center; }
        h1 { color: #27ae60; }
    </style>
</head>
<body>
    <h1>✅ 登录成功！</h1>
    <p>Token: <span id="token"></span></p>
    <script>
        var token = localStorage.getItem('token');
        document.getElementById('token').textContent = token ? token.substring(0, 30) + '...' : '无';
    </script>
</body>
</html>
