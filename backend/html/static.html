<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockAI - 登录</title>
    <style>
        body { margin: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .login-box { background: white; padding: 40px; border-radius: 16px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: 24px; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .tip { text-align: center; margin-top: 20px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>📈 StockAI 登录</h1>
        <input type="text" placeholder="用户名" value="testuser" id="username">
        <input type="password" placeholder="密码" value="test123" id="password">
        <button onclick="login()">登录</button>
        <div class="tip">测试账号: testuser / test123</div>
    </div>
    <script>
        function login() {
            alert('登录成功！正在跳转到分析页面...');
            document.body.innerHTML = '<div style="color:white;text-align:center;margin-top:100px"><h1>✅ 登录成功</h1><p>后端API: localhost:8001</p><p>请使用后端服务进行股票分析</p></div>';
        }
    </script>
</body>
</html>
